<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>recall cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .badge {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: #1a1a2e;
    background: #ffc857;
    padding: 8px 32px;
    border-radius: 12px;
  }
  .title {
    font-family: 'Noto Sans SC', 'Inter', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: #1a1a2e;
    text-align: center;
    line-height: 1.3;
  }
  .hl { color: #d4860a; font-style: italic; }
  .sub {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: #555566;
    text-align: center;
    line-height: 1.6;
  }
  .features {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 16px;
    color: #999aaa;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">必备插件</div>
    <div class="title"><span class="hl">Claude Code</span><br>终于有记忆了</div>
    <div class="sub">昨天聊了什么？做了什么决策？还有什么没做完？<br>一个插件，自动记录 + 一键恢复</div>
    <div class="features">自动记录 / 按项目归档 / recall 恢复 / 开源免费</div>
  </div>
</body>
</html>
